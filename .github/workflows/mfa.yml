name: MFA Bear Daily Report

on:
  schedule:
    # Times are UTC. US Pacific = UTC-7 (PDT, Mar–Nov) or UTC-8 (PST, Nov–Mar).
    # ┌─ DST: cron is fixed UTC. Twice a year, bump BOTH lines' HOUR by 1 (minute unchanged):
    # │   Winter (PST/EST, ~Nov→Mar): "35 13"→"35 14"  AND  "7 14"→"7 15"
    # │   Summer (PDT/EDT, ~Mar→Nov): "35 14"→"35 13"  AND  "7 15"→"7 14"
    # │   Slot detection keys off the MINUTE (35=open, 7=mid-session), so it survives the bump.
    # └────────────────────────────────────────────────────────────────────────────────────────
    # Market-open run: ~6:35 AM PT / 9:35 AM ET, ~5 min after the 13:30 UTC open → live options
    # + intraday RVOL. Owns the 'premarket' report set. 6:35 AM PDT = 13:35 UTC.
    - cron: "35 13 * * 1-5"
    # Mid-session run: ~7:00 AM PT / 10:00 AM ET → intraday RVOL. Owns the 'midsession' set.
    # 7:00 AM PDT = 14:00 UTC.
    - cron: "7 14 * * 1-5"
  workflow_dispatch:        # "Run workflow" button — manual trigger from GitHub web/mobile app

permissions:
  contents: read
  pages: write
  id-token: write

# allow only one concurrent deploy
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Decide slot + intraday flag
        id: mode
        run: |
          # Two outputs, DECOUPLED (both scheduled runs are now in-hours, so slot can't be
          # inferred from "is it intraday"):
          #  • flag — --intraday inside US market hours (~13:30–20:00 UTC EDT) so option chains +
          #    cumulative-volume RVOL are live; empty otherwise (script falls back to EOD anyway).
          #  • slot — which of the two daily report sets this run OWNS. Keyed off the triggering
          #    cron's MINUTE field, which is DST-INVARIANT: the EST/EDT switch only bumps the HOUR
          #    (35 13→35 14, 7 14→7 15), so minute 35 = the market-open run = 'premarket' set, and
          #    minute 7 = the mid-session run = 'midsession' set, in BOTH seasons. Manual
          #    (workflow_dispatch) runs have no schedule → fall back to a 14:00 UTC clock split.
          H=$(date -u +%H); M=$(date -u +%M)
          MINS=$((10#$H * 60 + 10#$M))
          if [ "$MINS" -ge 810 ] && [ "$MINS" -le 1200 ]; then
            echo "flag=--intraday" >> "$GITHUB_OUTPUT"
          else
            echo "flag="           >> "$GITHUB_OUTPUT"
          fi
          SCHED="${{ github.event.schedule }}"   # e.g. "35 13 * * 1-5"; empty on manual runs
          MIN_FIELD="${SCHED%% *}"               # first field = minute
          case "$MIN_FIELD" in
            35) SLOT=premarket;  OTHER=midsession ;;   # market-open run
            7)  SLOT=midsession; OTHER=premarket  ;;   # mid-session run
            *)  if [ "$MINS" -lt 840 ]; then SLOT=premarket;  OTHER=midsession;
                else                          SLOT=midsession; OTHER=premarket; fi ;;
          esac
          echo "slot=$SLOT"   >> "$GITHUB_OUTPUT"
          echo "other=$OTHER" >> "$GITHUB_OUTPUT"

      - name: Generate 3-profile reports
        env:
          # Finnhub free-tier key (reliable forward earnings date + price cross-check).
          # Add it under repo Settings → Secrets and variables → Actions → New repository secret,
          # name FINNHUB_API_KEY. If unset, the run still works keyless (yfinance/FRED only).
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          # FRED API key (free, fred.stlouisfed.org). REQUIRED for macro/regime from Actions:
          # the keyless fredgraph.csv endpoint is blocked from GitHub's datacenter IPs, so add
          # FRED_API_KEY as a repo secret to use the official API. If unset, the run degrades to
          # keyless FRED (works locally but shows the FRED badge yellow from CI).
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          mkdir -p public
          BASE="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          # Carry forward the OTHER slot's 3 already-published profile files (the whole Pages site
          # is replaced each deploy). Best-effort — first-ever run 404s gracefully.
          for p in winrate balanced payoff; do
            curl -fsSL "$BASE/${{ steps.mode.outputs.other }}-$p.html" \
              -o "public/${{ steps.mode.outputs.other }}-$p.html" \
              || echo "no prior ${{ steps.mode.outputs.other }}-$p.html yet"
          done
          # This run: build all 3 profiles for THIS slot + index.html (redirects to winrate).
          python mfa_layer0.py --bearcall --regime --alt ${{ steps.mode.outputs.flag }} \
            --all-profiles --slot ${{ steps.mode.outputs.slot }} --out-dir public --json
          # Static landing page linking every report (committed in repo root).
          cp history.html public/history.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
